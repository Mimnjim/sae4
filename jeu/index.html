<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Menu - Cyber Bike</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ============================= */
/* RESET & BODY */
/* ============================= */
body {
    margin: 0;
    padding: 0;
    background: #000;
    font-family: 'Orbitron', sans-serif;
    color: #00ffff;
    overflow: hidden;
    position: relative;
}

/* ============================= */
/* MENU CONTAINER */
/* ============================= */
#menu-container {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
    z-index: 10;
    position: relative;
}

/* ============================= */
/* TITRE CYBERPUNK */
#menu-container h1 {
    font-size: 5em;
    color: #ff0055;
    text-shadow: 0 0 20px #ff0055, 0 0 40px #ff0055, 0 0 60px #ff0055;
    margin-bottom: 50px;
    animation: pulse 2s infinite alternate;
}

@keyframes pulse {
    0% { text-shadow: 0 0 20px #ff0055, 0 0 40px #ff0055, 0 0 60px #ff0055; color:#ff0055; }
    50% { text-shadow: 0 0 30px #00ffff, 0 0 60px #00ffff, 0 0 90px #00ffff; color:#00ffff; }
    100% { text-shadow: 0 0 20px #ff0055, 0 0 40px #ff0055, 0 0 60px #ff0055; color:#ff0055; }
}

/* ============================= */
/* BOUTONS */
.menu-button {
    display: block;
    width: 250px;
    padding: 20px 0;
    margin: 20px 0;
    font-size: 1.5em;
    color: #00ffff;
    background-color: rgba(0,0,0,0.7);
    border: 2px solid #00ffff;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    text-shadow: 0 0 10px #00ffff;
    overflow: hidden;
}

/* Glitch effect au survol */
.menu-button:hover {
    color: #ff0055;
    border-color: #ff0055;
    text-shadow: 0 0 20px #ff0055, 0 0 40px #ff0055;
}

.menu-button::before, .menu-button::after {
    content: attr(data-text);
    position: absolute;
    left: 0; top: 0;
    width: 100%; height: 100%;
    opacity: 0;
    color: #00ffff;
    background: transparent;
    overflow: hidden;
}

.menu-button:hover::before {
    opacity: 0.7;
    animation: glitchTop 0.3s infinite linear;
}

.menu-button:hover::after {
    opacity: 0.7;
    animation: glitchBottom 0.3s infinite linear;
}

@keyframes glitchTop {
    0% { transform: translate(2px, -2px); }
    20% { transform: translate(-2px, 2px); }
    40% { transform: translate(-2px, -2px); }
    60% { transform: translate(2px, 2px); }
    80% { transform: translate(-2px, 2px); }
    100% { transform: translate(2px, -2px); }
}

@keyframes glitchBottom {
    0% { transform: translate(-2px, 2px); }
    20% { transform: translate(2px, -2px); }
    40% { transform: translate(2px, 2px); }
    60% { transform: translate(-2px, -2px); }
    80% { transform: translate(-2px, -2px); }
    100% { transform: translate(-2px, 2px); }
}

/* ============================= */
/* ANIMATION DE FOND NEON */
body::before {
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(45deg, #ff0055 0%, #00ffff 50%, #ff0055 100%);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    opacity: 0.05;
    z-index: 1;
}

@keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}
</style>
</head>
<body>

<div id="menu-container">
    <h1>CYBER BIKE</h1>
    <button class="menu-button" data-text="Facile" data-difficulty="easy">Facile</button>
    <button class="menu-button" data-text="Normal" data-difficulty="normal">Normal</button>
    <button class="menu-button" data-text="Difficile" data-difficulty="hard">Difficile</button>
</div>

<audio id="hover-sound" src="assets/sounds/neon_hover.wav"></audio>
<audio id="click-sound" src="assets/sounds/neon_click.wav"></audio>

<script>
// =============================
// GESTION DES BOUTONS + REDIRECTION
// =============================
const hoverSound = document.getElementById('hover-sound');
const clickSound = document.getElementById('click-sound');

const difficultyMap = {
    easy: 1,
    normal: 2,
    hard: 3
};

document.querySelectorAll('.menu-button').forEach(btn => {
    btn.addEventListener('mouseenter', () => {
        hoverSound.currentTime = 0;
        hoverSound.play();
    });

    btn.addEventListener('click', () => {
        clickSound.currentTime = 0;
        clickSound.play();

        const difficultyKey = btn.dataset.difficulty;
        const difficultyValue = difficultyMap[difficultyKey] || 1;

        // REDIRECTION vers level.html avec paramètre difficulty
        window.location.href = `all-levels.html?difficulty=${difficultyValue}`;
    });
});
</script>

</body>
</html>
