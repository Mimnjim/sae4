<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>AU-DELÀ DE L'HUMAIN - Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="ui">

        <div class="life-title">
        <h1>AU-DELÀ DE L'HUMAIN // SYSTÈME_ACTIF</h1>
            <div id="lives-display" class="vies">GHOST_INTEGRITY: <span id="health-value">100</span>%</div>
            <div id="container-timer">
                <div id="timer"></div>
            </div>
        </div>

        <div class="items-got">
                <h2>ITEMS RAMASSÉS</h2>
                <div id="items-container">
                    <div class="item-got">0</div>
                </div>
        </div>

    </div>

    <div id="loading-message" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,1); color: #00ffff; padding: 40px 60px; border-radius: 10px; font-size: 24px; z-index: 1000; font-family: monospace; height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center;">
        CHARGEMENT DES ASSETS...
    </div>

    <div id="game-over">
        <h2 class="log-out">SYNCHRONISATION INTERROMPUE</h2>
        <button onclick="location.reload()">RE-SYNCHRONISER</button>
    </div>

    <div id="victory-screen">
        <h2 class="log-out">SYNCHRONISATION TOTALE</h2>
        <!-- <button onclick="location.reload()">RE-PLONGER</button> -->
        <button onclick="location.reload()">RE-PLONGER</button>
        <button onclick="location.href='index.html'">QUITTER LE JEU</button>
    </div>
    <script src="all-levels.js" type="module" defer></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
</body>
</html>
