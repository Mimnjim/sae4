<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AU-DELÀ DE L'HUMAIN - Sélection de difficulté</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: linear-gradient(135deg, #0a0e27 0%, #1d3557 100%);
            color: #00ffff;
            font-family: 'Courier New', monospace;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .menu-container {
            text-align: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 60px 80px;
            border-radius: 20px;
            border: 3px solid #00ffff;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.5);
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 15px;
            color: #00ffff;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.8);
            letter-spacing: 3px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #ff0055;
            margin-bottom: 50px;
            letter-spacing: 2px;
        }

        .difficulty-buttons {
            display: flex;
            flex-direction: column;
            gap: 25px;
            align-items: center;
        }

        .btn-difficulty {
            width: 400px;
            padding: 20px 40px;
            font-size: 1.5rem;
            font-family: 'Courier New', monospace;
            background: rgba(0, 255, 255, 0.1);
            color: #00ffff;
            border: 2px solid #00ffff;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 3px;
            position: relative;
            overflow: hidden;
        }

        .btn-difficulty::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(0, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn-difficulty:hover::before {
            width: 500px;
            height: 500px;
        }

        .btn-difficulty:hover {
            background: rgba(0, 255, 255, 0.3);
            border-color: #fff;
            color: #fff;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.6);
            transform: scale(1.05);
        }

        .btn-difficulty:active {
            transform: scale(0.98);
        }

        .btn-easy {
            border-color: #00ff00;
            color: #00ff00;
        }

        .btn-easy:hover {
            border-color: #00ff00;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.6);
        }

        .btn-normal {
            border-color: #ffaa00;
            color: #ffaa00;
        }

        .btn-normal:hover {
            border-color: #ffaa00;
            box-shadow: 0 0 30px rgba(255, 170, 0, 0.6);
        }

        .btn-hard {
            border-color: #ff0055;
            color: #ff0055;
        }

        .btn-hard:hover {
            border-color: #ff0055;
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.6);
        }

        .difficulty-info {
            position: relative;
            z-index: 1;
        }

        .difficulty-title {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .difficulty-desc {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .glitch {
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0%, 100% {
                text-shadow: 0 0 20px rgba(0, 255, 255, 0.8);
            }
            25% {
                text-shadow: -2px 0 20px rgba(255, 0, 85, 0.8), 2px 0 20px rgba(0, 255, 255, 0.8);
            }
            50% {
                text-shadow: 2px 0 20px rgba(0, 255, 255, 0.8), -2px 0 20px rgba(255, 0, 85, 0.8);
            }
            75% {
                text-shadow: 0 0 20px rgba(0, 255, 255, 0.8);
            }
        }
    </style>
</head>
<body>
    <div class="menu-container">
        <h1 class="glitch">AU-DELÀ DE L'HUMAIN</h1>
        <div class="subtitle">// SÉLECTION DIFFICULTÉ //</div>
        
        <div class="difficulty-buttons">
            <button class="btn-difficulty btn-easy" onclick="startGame(1)">
                <div class="difficulty-info">
                    <div class="difficulty-title">FACILE</div>
                    <div class="difficulty-desc">Vitesse modérée • 25 ennemis • 120 HP</div>
                </div>
            </button>

            <button class="btn-difficulty btn-normal" onclick="startGame(2)">
                <div class="difficulty-info">
                    <div class="difficulty-title">NORMAL</div>
                    <div class="difficulty-desc">Vitesse rapide • 50 ennemis • 100 HP</div>
                </div>
            </button>

            <button class="btn-difficulty btn-hard" onclick="startGame(3)">
                <div class="difficulty-info">
                    <div class="difficulty-title">DIFFICILE</div>
                    <div class="difficulty-desc">Vitesse extrême • 70 ennemis • 80 HP</div>
                </div>
            </button>
        </div>
    </div>

    <script>
        function startGame(difficulty) {
            window.location.href = `game.html?difficulty=${difficulty}`;
        }
    </script>
</body>
</html>
