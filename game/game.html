<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jeu immersif en 3D">
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/examples/jsm/loaders/GLTFLoader.js": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js"
            }
        }
    </script>
    <style>
        html,body { height:100%; margin:0; background:#000; }
        #loading-overlay { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.85); color:#fff; font-family:sans-serif; z-index:99999; }
        #loading-overlay .spinner { width:48px; height:48px; border-radius:50%; border:4px solid rgba(255,255,255,0.15); border-top-color:#fff; animation:spin 1s linear infinite; margin-bottom:12px; }
        @keyframes spin { to { transform:rotate(360deg); } }
        #game-container { width:100%; height:100%; }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <div id="loading-overlay"><div style="text-align:center;"><div class="spinner"></div><div id="loading-message">Chargement du jeu…</div></div></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/stats.js/r17/Stats.min.js"></script>
    <script src="main.js" type="module"></script>

</body>
</html>
