<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>AU-DELÀ DE L'HUMAIN - Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="ui">
        <div class="life-title">
        <h1>AU-DELÀ DE L'HUMAIN // SYSTÈME_ACTIF</h1>
            <div id="lives-display" class="vies">GHOST_INTEGRITY: <span id="health-value">100</span>%</div>
            <div id="container-timer">
                <div id="timer"></div>
            </div>
            <div id="boost-display" class="boost-bar" style="margin-top: 10px;">
                <div style="color: #00ffff; font-size: 0.9em; margin-bottom: 5px;">BOOST: <span id="boost-status">CHARGEMENT...</span></div>
                <div style="background: #222; padding: 3px; border: 2px solid #00ffff;">
                    <div id="boost-bar" style="width: 0%; height: 15px; background: #00ffff; transition: width 0.1s;"></div>
                </div>
            </div>
        </div>
        <div class="items-got">
            <h2>ITEMS RAMASSÉS</h2>
            <div id="items-container">
                <div class="item-got">0</div>
            </div>
        </div>
    </div>

    <div id="loading-message" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); color: #00ffff; padding: 40px 60px; border-radius: 10px; font-size: 24px; z-index: 1000; font-family: monospace; height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; border: 3px solid #00ffff;">
        <div style="text-align: center;">
            <div style="font-size: 3em; margin-bottom: 20px; animation: pulse 1.5s infinite;">⚡</div>
            <div id="loading-text">CHARGEMENT DES ASSETS<span id="dots"></span></div>
            <div style="font-size: 0.7em; opacity: 0.7; margin-top: 10px;">Initialisation du système</div>
        </div>
    </div>

    <style>
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
        }
    </style>

    <script>
        // Animation des points de chargement
        let dotCount = 0;
        const dotsElement = document.getElementById('dots');
        if (dotsElement) {
            setInterval(() => {
                dotCount = (dotCount + 1) % 4;
                dotsElement.textContent = '.'.repeat(dotCount);
            }, 500);
        }
    </script>

    <div id="game-over">
        <h2 class="log-out">SYNCHRONISATION INTERROMPUE</h2>
        <button onclick="location.reload()">RE-SYNCHRONISER</button>
    </div>

    <div id="victory-screen">
        <h2 class="log-out">SYNCHRONISATION TOTALE</h2>
        <button onclick="location.reload()">RE-PLONGER</button>
        <button onclick="location.href='index.html'">RETOUR AU MENU</button>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stats.js/r17/Stats.min.js"></script>
    <script src="all-levels.js" type="module"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
</body>
</html>
